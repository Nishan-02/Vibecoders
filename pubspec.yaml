name: shivara
description: Shivara - Mental Health Ecosystem App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Sensors & Hardware
  sensors_plus: ^4.0.2
  geolocator: ^13.0.1
  flutter_contacts: ^1.1.9+2
  record: ^6.2.0
  vibration: ^2.0.0
  camera: ^0.11.0+3

  # Utilities
  uuid: ^4.4.2
  permission_handler: ^11.3.1

  # State Management
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  path_provider: ^2.1.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
